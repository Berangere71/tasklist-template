services:
  php:
    
    build: .
    ports:
      - "2345:80"
    volumes:
      - .:/var/www/html
    
    depends_on:
       - bdd


  bdd:
    image: mysql:8.0

    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: app-database

    ports:
      - "3308:3306"
  
  adminer:
    image: adminer
    ports:
      - "8081:8080"

  